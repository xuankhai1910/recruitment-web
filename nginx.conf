server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip cho asset
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;

    # Cache asset có hash (Vite tự thêm hash vào filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: mọi route không tồn tại file -> trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Index không cache để luôn lấy bản mới sau deploy
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
